<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ToDO-App</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
<link  rel="stylesheet" href="style.css">



</head>

<body>
<div class="container">
    <div class="todo-app">
        <h1>To-Do-App</h1>
       
          <!-- Section Statistiques (Barre de progression) -->
            <div class="stat-container">
                <div class="details">
                    <h3>Progrès</h3>
                    <div class="progress-bar">
                        <div id="progress"></div>
                    </div>
                </div>
                <div class="numbers">
                    <p id="numbers">0 / 0</p>
                </div>
            </div>
       
       
        <form class="input-area">

            <input type="text" id="task-input" placeholder="Ajouter une tâche...">
            <button 
            type="button" id="add-task-btn"><i class="fa-solid fa-plus"></i>
            </button>
        </form>

        
        <div class="todos-container">
             <img class="empty-image" src="./undraw_counting-stars_1fur.svg" alt="empty">
                <ul id="task-list">
                   
                </ul>
                
        </div>

    </div>
</div>


<!-- Script Confetti pour la célébration -->
    
</body>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <script src="index.js"></script>
</html>
